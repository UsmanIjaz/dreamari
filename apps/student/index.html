<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f2a20" />

    <!-- Primary SEO -->
    <title>Dreamari | Discover careers that fit who you are</title>
    <meta
      name="description"
      content="Not sure what's next? Discover careers that fit who you are through quick quizzes and real day-in-the-life adventures. Free to start, made for ages 13 to 18."
    />
    <link rel="canonical" href="https://dreamari.app/" />
    <meta name="robots" content="index, follow" />

    <!-- Favicon: the Dreamy companion -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Dreamari" />
    <meta property="og:title" content="Dreamari | Discover careers that fit who you are" />
    <meta
      property="og:description"
      content="Not sure what's next? Discover careers that fit who you are through quick quizzes and real day-in-the-life adventures. Free to start, made for ages 13 to 18."
    />
    <meta property="og:url" content="https://dreamari.app/" />
    <meta property="og:image" content="https://dreamari.app/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Dreamari, dream your future now" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dreamari | Discover careers that fit who you are" />
    <meta
      name="twitter:description"
      content="Not sure what's next? Discover careers that fit who you are through quick quizzes and real day-in-the-life adventures. Free to start, made for ages 13 to 18."
    />
    <meta name="twitter:image" content="https://dreamari.app/og-image.svg" />

    <!-- Installed / home-screen behavior so the web app feels native on mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dreamari" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Dreamari",
        "url": "https://dreamari.app/",
        "description": "Discover careers that fit who you are through quick quizzes and real day-in-the-life adventures. Free to start, made for ages 13 to 18.",
        "publisher": {
          "@type": "Organization",
          "name": "Dreamari",
          "url": "https://dreamari.app/",
          "logo": "https://dreamari.app/favicon.svg"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
